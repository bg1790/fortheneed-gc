<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Walk-in Registrations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f7fb;
        font-family: "Inter", sans-serif;
        padding: 32px 16px;
        box-sizing: border-box;
      }
      .container {
        max-width: 760px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
        color: #1f2a44;
      }
      #count {
        margin: 0 0 20px;
        font-size: 0.9rem;
        color: #6b7a99;
      }
      #status {
        font-size: 0.9rem;
        color: #a61e1e;
        margin-bottom: 16px;
        min-height: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 28px rgba(24, 39, 75, 0.1);
        overflow: hidden;
      }
      thead {
        background: #2b6ef2;
        color: #fff;
      }
      th, td {
        text-align: left;
        padding: 12px 16px;
        font-size: 0.92rem;
      }
      tbody tr {
        border-top: 1px solid #e8edf5;
      }
      tbody tr:hover {
        background: #f0f4ff;
      }
      .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 600;
        background: #e8edf5;
        color: #1f2a44;
      }
      .badge.Volunteer   { background: #dbeafe; color: #1d4ed8; }
      .badge.Arrow       { background: #dcfce7; color: #15803d; }
      .badge.Guest       { background: #fef9c3; color: #854d0e; }
      .badge.ParentGuardian { background: #fce7f3; color: #9d174d; }
      #empty {
        text-align: center;
        padding: 48px;
        color: #6b7a99;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Walk-in Registrations</h1>
      <p id="count"></p>
      <p id="status" aria-live="polite"></p>
      <table id="table">
        <thead>
          <tr>
            <th>#</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Type</th>
            <th>Registered At</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="5" id="empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
    <script>
      window.FIREBASE_CONFIG = {
        "projectId": "gcftnproject",
        "appId": "1:337643229915:web:0c2ca18d646f0e49b872fe",
        "storageBucket": "gcftnproject.firebasestorage.app",
        "apiKey": "AIzaSyC_R9sZCW48LH2MfbgM0cGp7toU_Ube7wY",
        "authDomain": "gcftnproject.firebaseapp.com",
        "messagingSenderId": "337643229915",
        "measurementId": "G-T9222YZ7CZ"
      };
    </script>
    <script>
      const statusEl = document.getElementById("status");
      const tbody = document.getElementById("tbody");
      const countEl = document.getElementById("count");

      function badgeClass(type) {
        return type === "Parent/Guardian" ? "ParentGuardian" : type;
      }

      function formatDate(iso) {
        if (!iso) return "—";
        return new Date(iso).toLocaleString();
      }

      function render(entries) {
        if (entries.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" id="empty">No registrations yet.</td></tr>';
          countEl.textContent = "";
          return;
        }
        countEl.textContent = `${entries.length} registration${entries.length !== 1 ? "s" : ""}`;
        tbody.innerHTML = entries.map((entry, i) => `
          <tr>
            <td>${entries.length - i}</td>
            <td>${entry.firstName}</td>
            <td>${entry.lastName}</td>
            <td><span class="badge ${badgeClass(entry.walkinType)}">${entry.walkinType}</span></td>
            <td>${formatDate(entry.createdAt)}</td>
          </tr>
        `).join("");
      }

      firebase.initializeApp(window.FIREBASE_CONFIG);
      const db = firebase.database();

      firebase.auth().signInAnonymously()
        .then(() => {
          db.ref("walkins").on("value", (snapshot) => {
            const val = snapshot.val() || {};
            const entries = Object.values(val).reverse();
            render(entries);
          }, (err) => {
            statusEl.textContent = "Failed to load registrations: " + (err.message || err);
          });
        })
        .catch((err) => {
          statusEl.textContent = "Auth failed: " + (err.message || err);
        });
    </script>
  </body>
</html>
