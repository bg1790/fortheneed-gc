<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Walk-in Volunteer Event</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #f5f7fb;
        font-family: "Inter", sans-serif;
      }
      .banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #2b6ef2;
        color: #fff;
        text-align: center;
        padding: 18px 16px;
        font-size: 1.6rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        z-index: 20;
      }
      .ribbon {
        position: fixed;
        top: 67px;
        left: 0;
        right: 0;
        background: #edf2ff;
        border-bottom: 2px solid #2b6ef2;
        display: flex;
        align-items: stretch;
        padding: 0 8px;
        z-index: 10;
        min-height: 56px;
      }
      .ribbon-group {
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 6px 8px;
        border-right: 1px solid #c7d2e5;
      }
      .ribbon-group:last-child {
        border-right: none;
      }
      .ribbon-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 6px 18px;
        border: 1px solid transparent;
        border-radius: 3px;
        background: transparent;
        color: #1f2a44;
        font-family: inherit;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        min-width: 72px;
        white-space: nowrap;
        line-height: 1.3;
        transition: background 0.1s, border-color 0.1s;
      }
      .ribbon-btn:hover {
        background: #c8d9ff;
        border-color: #2b6ef2;
      }
      .ribbon-btn:active {
        background: #b0c8ff;
      }
      .hidden {
        display: none !important;
      }
      .workspace {
        margin-top: 135px;
        padding: 32px 24px;
        max-width: 560px;
        margin-left: auto;
        margin-right: auto;
      }
      .workspace h1 {
        margin: 0 0 8px;
        font-size: 1.3rem;
        color: #1f2a44;
      }
      .workspace p {
        margin: 0;
        color: #5a6a8a;
        font-size: 0.95rem;
      }

      /* Modal */
      #modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.55);
        z-index: 100;
        place-items: center;
      }
      #modal-overlay.open {
        display: grid;
      }
      #modal-box {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 24px 64px rgba(15, 23, 42, 0.22);
        padding: 28px 28px 24px;
        width: min(92vw, 380px);
      }
      #modal-box h2 {
        margin: 0 0 20px;
        font-size: 1.25rem;
        color: #1f2a44;
      }
      #signin-form {
        display: grid;
        gap: 12px;
      }
      #signin-form label {
        font-size: 0.92rem;
        color: #1f2a44;
        display: grid;
        gap: 5px;
      }
      #signin-form input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #c7d2e5;
        border-radius: 8px;
        font: inherit;
        padding: 10px 12px;
      }
      #signin-form input:focus {
        outline: none;
        border-color: #2b6ef2;
        box-shadow: 0 0 0 3px rgba(43, 110, 242, 0.15);
      }
      #si-error {
        margin: 0;
        min-height: 18px;
        font-size: 0.88rem;
        color: #b91c1c;
      }
      .modal-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 4px;
      }
      .modal-actions button {
        padding: 10px 16px;
        border-radius: 8px;
        font: inherit;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        border: none;
      }
      #si-submit {
        background: #2b6ef2;
        color: #fff;
      }
      #si-submit:hover { background: #1d5cd8; }
      #si-submit:disabled { background: #7d95ca; cursor: not-allowed; }
      #si-cancel {
        background: #f1f4fb;
        color: #1f2a44;
        border: 1px solid #c7d2e5;
      }
      #si-cancel:hover { background: #e2e8f4; }
    </style>
  </head>
  <body>
    <header class="banner">For the Need</header>

    <nav class="ribbon" aria-label="Main ribbon">
      <div class="ribbon-group">
        <button type="button" id="signin-btn" class="ribbon-btn">Sign In</button>
        <a data-href="/registration/" class="ribbon-btn hidden">Register</a>
        <a data-href="/view/" class="ribbon-btn hidden">View</a>
      </div>
    </nav>

    <main class="workspace">
      <h1>Walk-in Volunteer Event</h1>
      <p>Sign in to access registration and view walk-in records.</p>
    </main>

    <div id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div id="modal-box">
        <h2 id="modal-title">Sign In</h2>
        <form id="signin-form" novalidate>
          <label>
            Email
            <input type="email" id="si-email" autocomplete="email" required />
          </label>
          <label>
            Password
            <input type="password" id="si-password" autocomplete="current-password" required />
          </label>
          <p id="si-error" aria-live="polite"></p>
          <div class="modal-actions">
            <button type="submit" id="si-submit">Sign In</button>
            <button type="button" id="si-cancel">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      const CRED_HASHES = new Set([
        "3f1d1ef130b315dd1d5142661e0ee063200a22e6f990c0d9220c19a00efd7b33",
"c5f9600ede57c99ca2057445c5447f971cc5071cae1a67c31b6ecacfbacbcddf",
      ]);

      async function sha256(str) {
        const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
      }

      const overlay = document.getElementById("modal-overlay");
      const emailInput = document.getElementById("si-email");
      const passwordInput = document.getElementById("si-password");
      const errorEl = document.getElementById("si-error");
      const submitBtn = document.getElementById("si-submit");
      const signinBtn = document.getElementById("signin-btn");
      const protectedLinks = document.querySelectorAll(".ribbon a[data-href]");

      function revealProtectedLinks() {
        signinBtn.classList.add("hidden");
        protectedLinks.forEach(link => link.classList.remove("hidden"));
      }

      function openModal() {
        errorEl.textContent = "";
        emailInput.value = "";
        passwordInput.value = "";
        overlay.classList.add("open");
        setTimeout(() => emailInput.focus(), 50);
      }

      function closeModal() {
        overlay.classList.remove("open");
      }

      if (sessionStorage.getItem("ftn_auth") === "1") {
        revealProtectedLinks();
      }

      signinBtn.addEventListener("click", openModal);

      protectedLinks.forEach(link => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          location.href = link.dataset.href;
        });
      });

      document.getElementById("si-cancel").addEventListener("click", closeModal);

      overlay.addEventListener("click", (e) => {
        if (e.target === overlay) closeModal();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      document.getElementById("signin-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        errorEl.textContent = "";
        submitBtn.disabled = true;
        submitBtn.textContent = "Signing in…";

        const email = emailInput.value.trim().toLowerCase();
        const password = passwordInput.value;
        const hash = await sha256(email + ":" + password);

        if (CRED_HASHES.has(hash)) {
          sessionStorage.setItem("ftn_auth", "1");
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
          closeModal();
          revealProtectedLinks();
        } else {
          errorEl.textContent = "Incorrect email or password.";
          submitBtn.disabled = false;
          submitBtn.textContent = "Sign In";
          passwordInput.value = "";
          passwordInput.focus();
        }
      });
    </script>
  </body>
</html>
