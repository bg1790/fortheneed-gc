<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Walk-in Volunteer Event</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
        font-family: "Inter", sans-serif;
      }
      .banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        background: #2b6ef2;
        color: #fff;
        text-align: center;
        padding: 18px 16px;
        font-size: 1.6rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        box-shadow: 0 4px 12px rgba(24, 39, 75, 0.12);
      }
      .card {
        width: min(92vw, 420px);
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 10px 28px rgba(24, 39, 75, 0.1);
        padding: 24px;
        margin-top: 80px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: 1.35rem;
      }
      .actions {
        display: grid;
        gap: 12px;
      }
      .actions a {
        display: block;
        text-align: center;
        text-decoration: none;
        padding: 12px 16px;
        border-radius: 8px;
        background: #fff;
        border: 2px solid #2b6ef2;
        color: #2b6ef2;
        font-weight: 600;
        font-size: 1rem;
      }
      .actions a:hover {
        background: #eaf1ff;
      }
    </style>
  </head>
  <body>
    <header class="banner">For the Need</header>
    <main class="card">
      <h1>Walk-in Volunteer Event</h1>
      <nav class="actions">
        <a href="/registration/">Registration</a>
        <a href="/view/">View</a>
      </nav>
    </main>
  </body>
</html>
